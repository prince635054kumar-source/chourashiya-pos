<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chourashiya General Store</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root{--primary:#3498db;--success:#27ae60;--danger:#e74c3c;--bg:#f4f6f9;--card:#ffffff;--text:#2c3e50;--border:#ddd;}
    [data-theme="dark"]{--bg:#0f172a;--card:#1e2937;--text:#e2e8f0;--border:#475569;--primary:#60a5fa;}
    body{font-family:system-ui,-apple-system,sans-serif;margin:0;padding:12px;background:var(--bg);color:var(--text);line-height:1.5;}
    h1,h2{color:var(--text);margin:10px 0;}
    table{width:100%;border-collapse:collapse;margin:15px 0;background:var(--card);box-shadow:0 2px 8px rgba(0,0,0,0.1);}
    th,td{padding:12px 8px;border:1px solid var(--border);text-align:left;vertical-align:middle;}
    th{background:var(--primary);color:white;}
    input,button{padding:12px;margin:5px;font-size:16px;border-radius:8px;border:1px solid var(--border);}
    button{cursor:pointer;font-weight:600;}
    .success{background:var(--success);color:white;border:none;}
    .danger{background:var(--danger);color:white;border:none;}
    .scanner{border:3px solid var(--primary);padding:15px;margin:15px 0;background:var(--card);border-radius:12px;}
    .bill{background:var(--card);padding:20px;border:3px solid #2c3e50;margin:20px 0;border-radius:12px;}
    .total{font-size:1.8em;font-weight:bold;color:var(--success);}
    #reader{max-width:100%;margin:12px auto;border-radius:8px;}
    .stamp{position:relative;display:inline-block;margin:15px 0;padding:12px 40px;border:4px double #c0392b;color:#c0392b;font-size:20px;font-weight:bold;transform:rotate(-8deg);border-radius:8px;}
    .qty-btn{padding:6px 12px;font-size:18px;font-weight:bold;}
  </style>
</head>
<body>
  <h1>🏪 Chourashiya General Store</h1>

  <!-- Scanner -->
  <div class="scanner">
    <h2>📱 Barcode Scanner</h2>
    <button onclick="startScanner()" class="success">Start Scanner</button>
    <button onclick="stopScanner()" class="danger">Stop Camera</button>
    <div id="reader"></div>
  </div>

  <!-- Inventory -->
  <div style="background:var(--card);padding:15px;border-radius:12px;margin:15px 0;">
    <h2>📦 Inventory</h2>
    <input type="text" id="itemName" placeholder="Item Name" style="width:45%;">
    <input type="number" id="itemPrice" placeholder="Price ₹" style="width:25%;">
    <button onclick="addManualItem()" class="success">Add to Bill</button>
  </div>

  <!-- Customer Bill -->
  <div class="bill">
    <h2>🛒 Customer Bill</h2>
    <table id="billTable">
      <thead>
        <tr><th>Item</th><th>Qty</th><th>Rate</th><th>Amount</th><th>Action</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="total">Grand Total: ₹<span id="totalAmount">0</span></div>
    
    <div style="margin:15px 0;">
      <button onclick="addStamp()" class="success" style="width:48%;">🛡️ Add Shop Stamp</button>
      <button onclick="saveBill()" class="success" style="width:48%;">💾 Save & Print</button>
    </div>
    <button onclick="clearBill()" class="danger" style="width:100%;">Clear Bill</button>
  </div>

  <script>
    let billItems = [];
    let html5QrCode = null;

    function startScanner() {
      stopScanner();
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
          stopScanner();
          handleScannedItem(decodedText);
        }
      ).catch(err => alert("Camera Error: " + err));
    }

    function stopScanner() {
      if (html5QrCode) {
        html5QrCode.stop().catch(() => {});
        html5QrCode.clear();
      }
    }

    function handleScannedItem(itemName) {
      const qty = prompt(`"${itemName}" Scanned!\n\nQuantity डालें:`, "1");
      if (qty && parseFloat(qty) > 0) {
        const rate = prompt("Rate (Price) डालें:", "50");
        addToBill(itemName, parseFloat(qty), parseFloat(rate) || 50);
      }
    }

    function addManualItem() {
      const name = document.getElementById("itemName").value.trim();
      const price = parseFloat(document.getElementById("itemPrice").value);
      if (name && price) {
        addToBill(name, 1, price);
        document.getElementById("itemName").value = "";
        document.getElementById("itemPrice").value = "";
      } else {
        alert("Item Name और Price डालें");
      }
    }

    function addToBill(name, qty, rate) {
      const amount = qty * rate;
      billItems.push({name, qty, rate, amount});
      renderBill();
    }

    function renderBill() {
      const tbody = document.querySelector("#billTable tbody");
      tbody.innerHTML = "";
      let total = 0;

      billItems.forEach((item, index) => {
        total += item.amount;
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${item.name}</td>
          <td style="text-align:center; white-space:nowrap;">
            <button onclick="changeQty(${index}, -1)" class="qty-btn danger">−</button>
            <b style="margin:0 12px;font-size:18px;">${item.qty}</b>
            <button onclick="changeQty(${index}, 1)" class="qty-btn success">+</button>
          </td>
          <td>₹${item.rate}</td>
          <td>₹${item.amount}</td>
          <td><button onclick="removeItem(${index})" class="danger">Remove</button></td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById("totalAmount").textContent = Math.round(total);
    }

    function changeQty(index, change) {
      billItems[index].qty += change;
      if (billItems[index].qty < 1) billItems[index].qty = 1;
      billItems[index].amount = billItems[index].qty * billItems[index].rate;
      renderBill();
    }

    function removeItem(index) {
      billItems.splice(index, 1);
      renderBill();
    }

    function addStamp() {
      if (document.getElementById("shopStamp")) return;
      const stamp = document.createElement("div");
      stamp.id = "shopStamp";
      stamp.className = "stamp";
      stamp.innerHTML = "CHOURASHIYA GENERAL STORE<br>✅ Paid & Authorized";
      document.querySelector(".bill").appendChild(stamp);
    }

    function saveBill() {
      if (billItems.length === 0) return alert("Bill खाली है!");
      alert("✅ Bill Saved Successfully!\n\nPrint करने के लिए Ctrl + P दबाएं");
    }

    function clearBill() {
      if (confirm("पूरा Bill Clear करें?")) {
        billItems = [];
        renderBill();
        const stamp = document.getElementById("shopStamp");
        if (stamp) stamp.remove();
      }
    }
  </script>
</body>
</html>
