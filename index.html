<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chourashiya General Store</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root{--primary:#3498db;--success:#27ae60;--danger:#e74c3c;--bg:#f4f6f9;--card:#ffffff;--text:#2c3e50;--border:#ddd;}
    [data-theme="dark"]{--bg:#0f172a;--card:#1e2937;--text:#e2e8f0;--border:#475569;--primary:#60a5fa;}
    body{font-family:system-ui,-apple-system,sans-serif;margin:0;padding:12px;background:var(--bg);color:var(--text);line-height:1.5;}
    h1,h2{margin:10px 0;color:var(--text);}
    table{width:100%;border-collapse:collapse;margin:15px 0;background:var(--card);box-shadow:0 2px 8px rgba(0,0,0,0.1);}
    th,td{padding:12px;border:1px solid var(--border);text-align:left;}
    th{background:var(--primary);color:white;}
    input,button{padding:12px;margin:5px;font-size:16px;border-radius:8px;border:1px solid var(--border);}
    button{cursor:pointer;font-weight:600;}
    .success{background:var(--success);color:white;border:none;}
    .danger{background:var(--danger);color:white;border:none;}
    .section{background:var(--card);padding:15px;border-radius:12px;margin:15px 0;}
    .ai-section{border:3px solid var(--primary);}
    .total{font-size:1.8em;font-weight:bold;color:var(--success);}
  </style>
</head>
<body>
  <button onclick="toggleTheme()" style="position:fixed;top:15px;right:15px;font-size:24px;z-index:999;">🌙</button>

  <h1>🏪 Chourashiya General Store</h1>
  <p style="color:#27ae60;font-weight:bold;">🤖 Hindi Voice AI Assistant</p>

  <!-- AI Assistant -->
  <div class="section ai-section">
    <h2>🤖 Hindi AI Assistant</h2>
    <p><strong>बोलें या लिखें:</strong> आलू का रेट, प्याज कितने का, टमाटर प्राइस</p>
    <div style="display:flex;gap:8px;">
      <input id="aiQuery" placeholder="आलू का रेट बताओ..." style="flex:1;" onkeypress="if(event.key==='Enter') askAI()">
      <button onclick="startVoice()" class="success" style="padding:12px 20px;">🎤 बोलें</button>
      <button onclick="askAI()" class="success">Ask</button>
    </div>
    <div id="aiResponse" style="margin-top:10px;padding:12px;background:#f0f8ff;border-radius:8px;min-height:90px;"></div>
  </div>

  <!-- Vegetable -->
  <div class="section">
    <h2>🥕 Vegetable Selling (Grams)</h2>
    <input id="vegName" placeholder="Sabji Naam" style="width:32%;">
    <input id="vegGrams" type="number" step="1" placeholder="Grams" style="width:110px;">
    <input id="vegRateKg" type="number" placeholder="Rate per Kg" style="width:130px;">
    <button onclick="addVegetableToBill()" class="success">Add to Bill</button>
  </div>

  <!-- Inventory -->
  <div class="section">
    <h2>📦 Inventory</h2>
    <input id="name" placeholder="Item Name (Aloo, Pyaj...)" style="width:35%;">
    <input id="cost" type="number" placeholder="Cost ₹" style="width:100px;">
    <input id="selling" type="number" placeholder="Selling ₹" style="width:120px;">
    <input id="qty" type="number" value="10" style="width:80px;">
    <button onclick="addProduct()" class="success">Add to Inventory</button>
  </div>

  <table id="productTable">
    <thead><tr><th>Name</th><th>Cost</th><th>Selling</th><th>Stock</th><th>Action</th></tr></thead>
    <tbody></tbody>
  </table>

  <!-- Bill -->
  <div class="section bill">
    <h2>🛒 Customer Bill</h2>
    <table id="billTable">
      <thead><tr><th>Item</th><th>Qty/Kg</th><th>Rate</th><th>Amount</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
    <p class="total">Grand Total: ₹<span id="grandTotal">0</span></p>
    <button onclick="clearBill()" class="danger" style="width:48%;">Clear Bill</button>
    <button onclick="printBill()" class="success" style="width:48%;">🖨️ Print Bill</button>
  </div>

  <script>
    let products = [];
    let bill = [];

    function addProduct() {
      const name = document.getElementById("name").value.trim();
      const cost = parseFloat(document.getElementById("cost").value) || 0;
      const selling = parseFloat(document.getElementById("selling").value) || 0;
      const qty = parseFloat(document.getElementById("qty").value) || 0;

      if (!name || selling <= 0) return alert("Item Name और Selling Price डालें!");

      products.push({name, cost, selling, qty});
      showProducts();

      document.getElementById("name").value = "";
      document.getElementById("cost").value = "";
      document.getElementById("selling").value = "";
    }

    function showProducts() {
      const tbody = document.getElementById("productTable").querySelector("tbody");
      tbody.innerHTML = "";
      products.forEach((item, i) => {
        tbody.innerHTML += `<tr>
          <td>${item.name}</td>
          <td>₹${item.cost}</td>
          <td>₹${item.selling}</td>
          <td>${item.qty}</td>
          <td><button onclick="addToBill(${i})" class="success">Add to Bill</button></td>
        </tr>`;
      });
    }

    function addToBill(i) {
      const item = products[i];
      const qty = prompt(`"${item.name}" कितनी Quantity?`, "1");
      if (qty && parseFloat(qty) > 0) {
        const q = parseFloat(qty);
        bill.push({name: item.name, qty: q, rate: item.selling, total: q * item.selling});
        showBill();
      }
    }

    // ==================== BETTER HINDI AI ====================
    function askAI() {
      const query = document.getElementById("aiQuery").value.toLowerCase().trim();
      processAIQuery(query);
    }

    function startVoice() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return alert("Voice support nahi hai is browser mein. Chrome use करें।");
      
      const recognition = new SpeechRecognition();
      recognition.lang = 'hi-IN';
      recognition.interimResults = false;
      recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        document.getElementById("aiQuery").value = text;
        processAIQuery(text.toLowerCase());
      };
      recognition.onerror = () => alert("Voice samajh nahi aaya, दोबारा बोलें");
      recognition.start();
    }

    function processAIQuery(query) {
      const div = document.getElementById("aiResponse");
      if (!query) return div.innerHTML = "कुछ बोलें या लिखें...";

      // Enhanced Hindi + English matching
      const found = products.filter(p => {
        const itemName = p.name.toLowerCase();
        return itemName.includes(query) || 
               query.includes(itemName) ||
               query.includes(itemName.split(" ")[0]) ||
               // Hindi common words
               (query.includes("आलू") && itemName.includes("potato")) ||
               (query.includes("प्याज") && itemName.includes("onion")) ||
               (query.includes("टमाटर") && itemName.includes("tomato"));
      });

      if (found.length > 0) {
        let html = "<b>✅ मिला:</b><br>";
        found.forEach(item => {
          html += `• <strong>${item.name}</strong> → बिक्री मूल्य: <b>₹${item.selling}</b> 
                   <button onclick="quickAdd('${item.name}')" style="font-size:13px;">Bill में जोड़ें</button><br>`;
        });
        div.innerHTML = html;
      } else {
        div.innerHTML = `❌ "${query}" इन्वेंटरी में नहीं मिला।<br>पहले Inventory में जोड़ें।`;
      }
    }

    function quickAdd(name) {
      const item = products.find(p => p.name === name);
      if (item) {
        const qty = prompt("Quantity कितनी है?", "1");
        if (qty) {
          const q = parseFloat(qty);
          bill.push({name: item.name, qty: q, rate: item.selling, total: q * item.selling});
          showBill();
        }
      }
    }

    // Vegetable (Grams)
    function addVegetableToBill() {
      const name = document.getElementById("vegName").value.trim();
      const grams = parseFloat(document.getElementById("vegGrams").value);
      const ratePerKg = parseFloat(document.getElementById("vegRateKg").value);

      if (!name || !grams || !ratePerKg) return alert("सभी जानकारी भरें");

      const kg = grams / 1000;
      const amount = kg * ratePerKg;

      bill.push({
        name: name + " (Sabzi)",
        qty: grams + " gm (" + kg.toFixed(3) + " kg)",
        rate: ratePerKg + "/kg",
        total: amount
      });

      showBill();

      document.getElementById("vegName").value = "";
      document.getElementById("vegGrams").value = "";
      document.getElementById("vegRateKg").value = "";
    }

    function showBill() {
      const tbody = document.getElementById("billTable").querySelector("tbody");
      tbody.innerHTML = "";
      let grand = 0;
      bill.forEach((item, i) => {
        grand += item.total;
        tbody.innerHTML += `<tr>
          <td>${item.name}</td>
          <td>${item.qty}</td>
          <td>₹${item.rate}</td>
          <td>₹${item.total.toFixed(2)}</td>
          <td><button onclick="removeFromBill(${i})" class="danger">Remove</button></td>
        </tr>`;
      });
      document.getElementById("grandTotal").innerText = grand.toFixed(2);
    }

    function removeFromBill(i) {
      if (confirm("Remove करें?")) {
        bill.splice(i, 1);
        showBill();
      }
    }

    function clearBill() {
      if (confirm("पूरा बिल क्लियर करें?")) {
        bill = [];
        showBill();
      }
    }

    function printBill() {
      alert("✅ बिल सेव हो गया!\nPrint के लिए Ctrl + P दबाएं");
    }

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";
      document.documentElement.setAttribute("data-theme", isDark ? "" : "dark");
    }

    window.onload = () => showProducts();
  </script>
</body>
</html>
