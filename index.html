<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Chourashiya General Store</title>
  <style>
    :root {
      --primary: #3498db;
      --success: #27ae60;
      --danger: #e74c3c;
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #2c3e50;
      --border: #ddd;
      --safe-top: max(16px, env(safe-area-inset-top));
      --safe-bottom: max(16px, env(safe-area-inset-bottom));
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card: #1e2937;
      --text: #e2e8f0;
      --border: #475569;
      --primary: #60a5fa;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    #appContainer {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #3498db, #27ae60);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
      text-align: center;
      animation: fadeOut 2.8s forwards 2s;
      padding: var(--safe-top) 0 var(--safe-bottom) 0;
    }

    .store-name {
      font-size: 2.6rem;
      font-weight: bold;
      margin: 8px 0;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .tagline {
      font-size: 1.3rem;
      animation: fadeIn 1.5s ease 0.6s both;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

    .header {
      background: var(--card);
      padding: var(--safe-top) 12px 12px 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 100;
    }

    .header h1 {
      margin: 0;
      font-size: 1.3em;
      flex: 1;
      text-align: center;
    }

    .theme-toggle {
      font-size: 24px;
      z-index: 999;
      padding: 8px 12px;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .tabs {
      display: flex;
      background: var(--card);
      padding: 6px;
      gap: 6px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text);
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .tab:hover { opacity: 0.8; }
    .tab.active { background: var(--primary); color: white; }

    .content-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px;
      padding-bottom: var(--safe-bottom);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .camera-view {
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      background: #000;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 500;
      padding: var(--safe-top) 0 var(--safe-bottom) 0;
    }

    .camera-view.active {
      display: flex;
    }

    .camera-view video {
      flex: 1;
      width: 100%;
      object-fit: cover;
    }

    .camera-controls {
      background: rgba(0, 0, 0, 0.8);
      padding: 12px;
      display: flex;
      gap: 8px;
    }

    .camera-controls button {
      flex: 1;
      padding: 12px;
      font-size: 16px;
    }

    .scanner-info {
      color: #fff;
      text-align: center;
      padding: 12px;
      background: rgba(0, 0, 0, 0.9);
      font-size: 14px;
    }

    #canvas {
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      background: var(--card);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      font-size: 13px;
    }

    th, td {
      padding: 10px;
      border: 1px solid var(--border);
      text-align: left;
    }

    th { background: var(--primary); color: white; }

    input, button {
      padding: 12px;
      margin: 5px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      -webkit-appearance: none;
      appearance: none;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    button:active { opacity: 0.8; }
    button.success { background: var(--success); color: white; border: none; }
    button.danger { background: var(--danger); color: white; border: none; }
    button.warning { background: #f39c12; color: white; border: none; }

    .section {
      background: var(--card);
      padding: 15px;
      border-radius: 12px;
      margin: 10px 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .total {
      font-size: 1.8em;
      font-weight: bold;
      color: var(--success);
      margin: 15px 0;
      text-align: center;
    }

    .flex-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      padding: var(--safe-top) 0 var(--safe-bottom) 0;
    }

    .modal-content {
      background-color: var(--card);
      margin: 10% auto;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
      font-size: 1.3em;
      font-weight: bold;
      margin-bottom: 20px;
      color: var(--text);
    }

    .modal-input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--text);
      font-size: 16px;
      -webkit-appearance: none;
      appearance: none;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-buttons button {
      flex: 1;
    }

    .close {
      color: var(--text);
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

    .small-btn {
      padding: 6px 10px !important;
      margin: 2px !important;
      font-size: 12px !important;
    }

    .save-status {
      background: #fff3cd;
      font-size: 0.9em;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .ai-response {
      margin-top: 10px;
      padding: 12px;
      background: #f0f8ff;
      border-radius: 8px;
      min-height: 100px;
      white-space: pre-wrap;
      font-size: 13px;
    }

    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }

    .action-buttons button {
      width: 48%;
      padding: 10px !important;
      margin: 0 !important;
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 1.1em;
      }

      .tab {
        padding: 10px;
        font-size: 12px;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 8px;
      }

      input, button {
        padding: 10px;
        margin: 4px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="appContainer">
    <!-- Splash Screen -->
    <div id="splashScreen">
      <h1 class="store-name">🏪 Chourashiya</h1>
      <h1 class="store-name" style="margin-top:-12px;">General Store</h1>
      <p class="tagline">Smart POS System</p>
    </div>

    <!-- Camera View (Full Screen) -->
    <div id="cameraView" class="camera-view">
      <div class="scanner-info">
        📱 Position barcode in frame - Scanner will auto-detect
      </div>
      <video id="videoStream" playsinline autoplay muted></video>
      <canvas id="canvas"></canvas>
      <div class="camera-controls">
        <button onclick="exitCameraMode()" class="danger">❌ Exit Scanner</button>
      </div>
    </div>

    <!-- Header -->
    <div class="header">
      <h1>🏪 Chourashiya POS</h1>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">🌙</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab(0)" id="tab0">🏠 Home</button>
      <button class="tab" onclick="switchTab(1)" id="tab1">📦 Inventory</button>
    </div>

    <!-- Content Area -->
    <div class="content-area">
      <!-- ==================== HOME TAB ==================== -->
      <div id="content0" class="tab-content active">
        <div class="save-status">
          💾 Data: Browser Storage
        </div>

        <!-- Camera Scanner Button -->
        <div class="section">
          <h2 style="margin-top: 0; margin-bottom: 12px;">📱 Scanner</h2>
          <button onclick="enterCameraMode('home')" class="success" style="width: 100%; padding: 16px; font-size: 18px;">📸 START SCANNER</button>
        </div>

        <!-- AI Assistant -->
        <div class="section">
          <h2 style="margin-top: 0;">🤖 AI</h2>
          <div class="flex-row">
            <input id="aiQuery" placeholder="Ask..." style="flex:1;" onkeypress="handleEnter(event, askAI)">
            <button onclick="askAI()" class="success" style="width: auto;">Ask</button>
          </div>
          <div id="aiResponse" class="ai-response"></div>
        </div>

        <!-- Grocery -->
        <div class="section">
          <h2 style="margin-top: 0;">🛒 Grocery</h2>
          <div class="flex-row">
            <input id="groceryName" placeholder="Item Name" style="flex:1;">
            <input id="groceryQty" type="number" placeholder="Qty" style="width:80px;">
            <input id="groceryRate" type="number" placeholder="Rate" style="width:90px;">
            <button onclick="addGroceryToBill()" class="success">Add</button>
          </div>
        </div>

        <!-- Vegetable -->
        <div class="section">
          <h2 style="margin-top: 0;">🥕 Vegetables</h2>
          <div class="flex-row">
            <input id="vegName" placeholder="Name" style="flex:1;">
            <input id="vegGrams" type="number" placeholder="Grams" style="width:90px;">
            <input id="vegRateKg" type="number" placeholder="Rate/Kg" style="width:100px;">
            <button onclick="addVegetableToBill()" class="success">Add</button>
          </div>
        </div>

        <!-- Bill -->
        <div class="section">
          <h2 style="margin-top: 0;">🛒 Bill</h2>
          <table id="billTable">
            <thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Amount</th><th>✕</th></tr></thead>
            <tbody></tbody>
          </table>
          <p class="total">₹<span id="grandTotal">0</span></p>
          <div class="action-buttons">
            <button onclick="clearBill()" class="danger">Clear</button>
            <button onclick="printBill()" class="success">Print</button>
          </div>
        </div>
      </div>

      <!-- ==================== INVENTORY TAB ==================== -->
      <div id="content1" class="tab-content">
        <!-- Camera Scanner Button -->
        <div class="section">
          <h2 style="margin-top: 0; margin-bottom: 12px;">📱 Scanner</h2>
          <button onclick="enterCameraMode('inventory')" class="success" style="width: 100%; padding: 16px; font-size: 18px;">📸 START SCANNER</button>
        </div>

        <!-- Add Product -->
        <div class="section">
          <h2 style="margin-top: 0;">📦 Add Product</h2>
          <div class="flex-row">
            <input id="barcodeInv" placeholder="Barcode" style="width:140px;">
            <input id="name" placeholder="Name" style="flex:1;">
          </div>
          <div class="flex-row">
            <input id="cost" type="number" placeholder="Cost" style="width:90px;">
            <input id="selling" type="number" placeholder="Selling" style="width:100px;">
            <input id="qty" type="number" value="10" style="width:70px;">
            <button onclick="addProduct()" class="success">Add</button>
          </div>
        </div>

        <!-- Products Table -->
        <table id="productTable">
          <thead><tr><th>Barcode</th><th>Name</th><th>Selling</th><th>Stock</th><th>Action</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Edit Stock Modal -->
  <div id="editStockModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeEditModal()">&times;</span>
      <div class="modal-header">✏️ Edit Stock</div>
      <div>
        <label style="font-weight: bold;">Item:</label>
        <input type="text" id="editItemName" class="modal-input" disabled>
        
        <label style="font-weight: bold;">Current:</label>
        <input type="number" id="editCurrentStock" class="modal-input" readonly>
        
        <label style="font-weight: bold;">New Quantity:</label>
        <input type="number" id="editNewStock" class="modal-input" placeholder="Enter quantity">
        
        <div class="modal-buttons">
          <button onclick="saveStockEdit()" class="success">Save</button>
          <button onclick="closeEditModal()" class="danger">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.0.0/dist/quagga.js"></script>

  <script>
    // ==================== BEEP SOUND ====================
    function playBeepSound() {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();

        oscillator.connect(gain);
        gain.connect(audioContext.destination);

        oscillator.frequency.value = 800;
        oscillator.type = 'sine';

        gain.gain.setValueAtTime(0.3, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);

        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.2);
      } catch (e) {}
    }

    // ==================== STATE ====================
    let products = [];
    let bill = [];
    let editingProductIndex = -1;
    let cameraActive = false;
    let currentCameraMode = null;
    let scannedBarcodes = new Set();

    const STORAGE_KEYS = {
      products: "chourashiya_products",
      bill: "chourashiya_bill",
      theme: "chourashiya_theme"
    };

    const domCache = {
      billTableBody: null,
      productTableBody: null,
      grandTotalSpan: null,
      aiResponse: null,
      init() {
        this.billTableBody = document.getElementById("billTable").querySelector("tbody");
        this.productTableBody = document.getElementById("productTable").querySelector("tbody");
        this.grandTotalSpan = document.getElementById("grandTotal");
        this.aiResponse = document.getElementById("aiResponse");
      }
    };

    // ==================== UTILITY ====================
    function handleEnter(event, callback) {
      if (event.key === 'Enter') callback();
    }

    function getInputValue(id) {
      return document.getElementById(id).value.trim();
    }

    function setInputValue(id, value) {
      document.getElementById(id).value = value;
    }

    function clearInputValues(ids) {
      ids.forEach(id => setInputValue(id, ""));
    }

    function parseNumber(value) {
      const num = parseFloat(value);
      return isNaN(num) ? 0 : num;
    }

    // ==================== STORAGE ====================
    function saveData() {
      try {
        localStorage.setItem(STORAGE_KEYS.products, JSON.stringify(products));
        localStorage.setItem(STORAGE_KEYS.bill, JSON.stringify(bill));
      } catch (e) {}
    }

    function loadData() {
      try {
        const savedProducts = localStorage.getItem(STORAGE_KEYS.products);
        if (savedProducts) products = JSON.parse(savedProducts);

        const savedBill = localStorage.getItem(STORAGE_KEYS.bill);
        if (savedBill) bill = JSON.parse(savedBill);
      } catch (e) {}
    }

    // ==================== THEME ====================
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute("data-theme") === "dark";
      html.setAttribute("data-theme", isDark ? "light" : "dark");
      localStorage.setItem(STORAGE_KEYS.theme, isDark ? "light" : "dark");
    }

    function initTheme() {
      const savedTheme = localStorage.getItem(STORAGE_KEYS.theme) || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);
    }

    // ==================== TABS ====================
    function switchTab(n) {
      const tabs = document.querySelectorAll('.tab');
      const contents = document.querySelectorAll('.tab-content');

      tabs.forEach((tab, i) => tab.classList.toggle('active', i === n));
      contents.forEach((content, i) => content.classList.toggle('active', i === n));
    }

    // ==================== CAMERA MODE ====================
    function enterCameraMode(mode) {
      currentCameraMode = mode;
      cameraActive = true;
      scannedBarcodes.clear();
      
      const cameraView = document.getElementById('cameraView');
      cameraView.classList.add('active');

      const videoStream = document.getElementById('videoStream');
      
      navigator.mediaDevices.getUserMedia({ 
        video: { 
          facingMode: 'environment',
          width: { ideal: 1280 },
          height: { ideal: 720 }
        } 
      })
      .then(stream => {
        videoStream.srcObject = stream;
        setTimeout(() => startBarcodeScanning(), 500);
      })
      .catch(err => {
        alert("❌ Camera access denied!");
        exitCameraMode();
      });
    }

    function exitCameraMode() {
      cameraActive = false;
      currentCameraMode = null;
      scannedBarcodes.clear();
      
      const cameraView = document.getElementById('cameraView');
      cameraView.classList.remove('active');

      const videoStream = document.getElementById('videoStream');
      if (videoStream.srcObject) {
        videoStream.srcObject.getTracks().forEach(track => track.stop());
      }

      Quagga.stop();
    }

    function startBarcodeScanning() {
      const videoStream = document.getElementById('videoStream');
      
      Quagga.init({
        inputStream: {
          name: 'Live',
          type: 'LiveStream',
          target: videoStream,
          constraints: {
            width: { min: 640 },
            height: { min: 480 },
            facingMode: 'environment'
          }
        },
        decoder: {
          readers: ['code_128_reader', 'ean_reader', 'ean_8_reader', 'upc_reader', 'codabar_reader']
        },
        locate: true,
        multiple: false
      }, function(err) {
        if (err) {
          console.log(err);
          return;
        }
        Quagga.start();
      });

      Quagga.onDetected(function(result) {
        if (result.codeResult && result.codeResult.code) {
          const barcode = result.codeResult.code;
          
          // Prevent duplicate scans in short time
          if (!scannedBarcodes.has(barcode)) {
            scannedBarcodes.add(barcode);
            playBeepSound();
            handleDetectedBarcode(barcode);
            
            // Remove from set after 1 second to allow re-scan
            setTimeout(() => scannedBarcodes.delete(barcode), 1000);
          }
        }
      });
    }

    function handleDetectedBarcode(barcode) {
      if (currentCameraMode === 'home') {
        const item = products.find(p => p.barcode === barcode);
        if (item) {
          exitCameraMode();
          const qtyStr = prompt(`"${item.name}" Quantity?`, "1");
          if (qtyStr) {
            const q = parseNumber(qtyStr);
            if (q > 0 && q <= item.qty) {
              bill.push({name: item.name, qty: q, rate: item.selling, total: q * item.selling});
              item.qty -= q;
              updateUI();
              saveData();
              alert(`✅ Added!`);
            } else {
              alert("❌ Low stock!");
            }
          }
        } else {
          alert("❌ Not in inventory!");
        }
      } else if (currentCameraMode === 'inventory') {
        const item = products.find(p => p.barcode === barcode);
        if (item) {
          exitCameraMode();
          alert(`✅ Found!\n${item.name}\nStock: ${item.qty}`);
        } else {
          exitCameraMode();
          setInputValue("barcodeInv", barcode);
          document.getElementById("name").focus();
          alert("🆕 New barcode - fill details!");
        }
      }
    }

    // ==================== EDIT STOCK ====================
    function openEditModal(index) {
      const item = products[index];
      editingProductIndex = index;

      document.getElementById("editItemName").value = item.name;
      document.getElementById("editCurrentStock").value = item.qty;
      document.getElementById("editNewStock").value = item.qty;

      document.getElementById("editStockModal").style.display = "block";
      document.getElementById("editNewStock").focus();
    }

    function closeEditModal() {
      document.getElementById("editStockModal").style.display = "none";
      editingProductIndex = -1;
    }

    function saveStockEdit() {
      const newStock = parseNumber(document.getElementById("editNewStock").value);

      if (editingProductIndex < 0 || editingProductIndex >= products.length) {
        alert("❌ Invalid!");
        return;
      }

      if (newStock < 0) {
        alert("❌ Cannot be negative!");
        return;
      }

      products[editingProductIndex].qty = newStock;
      saveData();
      updateUI();
      closeEditModal();
      alert(`✅ Updated!`);
    }

    window.onclick = function(event) {
      const modal = document.getElementById("editStockModal");
      if (event.target == modal) {
        closeEditModal();
      }
    }

    // ==================== PRODUCTS ====================
    function addProduct() {
      const barcode = getInputValue("barcodeInv");
      const name = getInputValue("name");
      const cost = parseNumber(document.getElementById("cost").value);
      const selling = parseNumber(document.getElementById("selling").value);
      const qty = parseNumber(document.getElementById("qty").value);

      if (!name || selling <= 0) return alert("Fill details!");

      const existing = products.find(p => p.barcode === barcode && barcode !== "");
      if (existing) {
        existing.qty += qty;
      } else {
        products.push({barcode, name, cost, selling, qty});
      }

      updateUI();
      saveData();
      clearInputValues(["barcodeInv", "name", "cost", "selling"]);
      setInputValue("qty", "10");
      document.getElementById("barcodeInv").focus();
    }

    function renderProductTable() {
      domCache.productTableBody.innerHTML = "";
      const fragment = document.createDocumentFragment();

      products.forEach((item, i) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${item.barcode || '-'}</td>
          <td>${item.name}</td>
          <td>₹${item.selling}</td>
          <td><strong>${item.qty}</strong></td>
          <td>
            <button onclick="addToBillFromInventory(${i})" class="success small-btn">Bill</button>
            <button onclick="openEditModal(${i})" class="warning small-btn">Edit</button>
          </td>
        `;
        fragment.appendChild(row);
      });

      domCache.productTableBody.appendChild(fragment);
    }

    function addToBillFromInventory(i) {
      const item = products[i];
      const qtyStr = prompt(`"${item.name}" Quantity?`, "1");
      if (!qtyStr) return;

      const q = parseNumber(qtyStr);
      if (q <= 0 || q > item.qty) return alert("Low stock!");

      bill.push({name: item.name, qty: q, rate: item.selling, total: q * item.selling});
      item.qty -= q;
      updateUI();
      saveData();
    }

    // ==================== BILL ====================
    function addGroceryToBill() {
      const name = getInputValue("groceryName");
      const qty = parseNumber(document.getElementById("groceryQty").value);
      const rate = parseNumber(document.getElementById("groceryRate").value);

      if (!name || qty <= 0 || rate <= 0) return alert("Fill all!");

      bill.push({name, qty, rate, total: qty * rate});
      updateUI();
      saveData();
      clearInputValues(["groceryName", "groceryQty", "groceryRate"]);
    }

    function addVegetableToBill() {
      const name = getInputValue("vegName");
      const grams = parseNumber(document.getElementById("vegGrams").value);
      const rate = parseNumber(document.getElementById("vegRateKg").value);

      if (!name || grams <= 0 || rate <= 0) return alert("Fill all!");

      const amount = (grams / 1000) * rate;
      bill.push({name: name + " (Veg)", qty: grams + "g", rate: rate, total: amount});
      updateUI();
      saveData();
      clearInputValues(["vegName", "vegGrams", "vegRateKg"]);
    }

    function renderBillTable() {
      domCache.billTableBody.innerHTML = "";
      const fragment = document.createDocumentFragment();
      let total = 0;

      bill.forEach((item, i) => {
        total += item.total || 0;
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${item.name}</td>
          <td>${item.qty}</td>
          <td>₹${item.rate}</td>
          <td>₹${(item.total || 0).toFixed(2)}</td>
          <td><button onclick="removeFromBill(${i})" class="danger small-btn">✕</button></td>
        `;
        fragment.appendChild(row);
      });

      domCache.billTableBody.appendChild(fragment);
      domCache.grandTotalSpan.textContent = total.toFixed(2);
    }

    function removeFromBill(i) {
      bill.splice(i, 1);
      updateUI();
      saveData();
    }

    function clearBill() {
      if (confirm("Clear bill?")) {
        bill = [];
        updateUI();
        saveData();
      }
    }

    function printBill() {
      const printWindow = window.open('', '_blank');
      const total = bill.reduce((sum, item) => sum + (item.total || 0), 0);

      let html = `<html><head><title>Bill</title><style>body{font-family:monospace;padding:20px;}table{width:100%;border-collapse:collapse;}th,td{border:1px solid;padding:8px;}</style></head><body>
        <h2 style="text-align:center">Chourashiya General Store</h2>
        <p style="text-align:center">Date: ${new Date().toLocaleDateString('hi-IN')}</p><hr>
        <table><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Amount</th></tr>`;

      bill.forEach(item => {
        html += `<tr><td>${item.name}</td><td>${item.qty}</td><td>₹${item.rate}</td><td>₹${item.total.toFixed(2)}</td></tr>`;
      });

      html += `</table><h3 style="text-align:center">Total: ₹${total.toFixed(2)}</h3><p style="text-align:center">Thank You 🙏</p><script>window.print();<\/script></body></html>`;
      printWindow.document.write(html);
    }

    // ==================== AI ====================
    function askAI() {
      const query = document.getElementById("aiQuery").value.trim();
      if (!query) {
        domCache.aiResponse.innerHTML = "🙋 Ask something...";
        return;
      }

      domCache.aiResponse.innerHTML = "🤖 Thinking...";

      setTimeout(() => {
        let response = `Query: "${query}"\n\n`;

        if (query.toLowerCase().includes('total')) {
          const total = bill.reduce((sum, item) => sum + (item.total || 0), 0);
          response += `📊 Bill Total: ₹${total.toFixed(2)}\n`;
        }

        if (query.toLowerCase().includes('stock')) {
          response += `📦 Stock:\n`;
          products.forEach(p => {
            response += `• ${p.name}: ${p.qty} units\n`;
          });
        }

        if (query.toLowerCase().includes('rate')) {
          response += `💰 Rates:\n`;
          products.slice(0, 5).forEach(p => {
            response += `• ${p.name}: ₹${p.selling}\n`;
          });
        }

        domCache.aiResponse.innerHTML = response || "No info found...";
      }, 600);
    }

    // ==================== UI ====================
    function updateUI() {
      renderProductTable();
      renderBillTable();
    }

    // ==================== INIT ====================
    window.addEventListener('load', () => {
      domCache.init();
      initTheme();
      loadData();
      updateUI();
    });
  </script>
</body>
</html>
